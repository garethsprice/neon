<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSim Stub - API Test</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --panel: #12121a;
            --border: #2a2a3a;
            --text: #e0e0e0;
            --dim: #888;
            --cyan: #00ffff;
            --magenta: #ff00ff;
            --green: #39ff14;
            --yellow: #ffff00;
            --orange: #ff6600;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'SF Mono', 'Consolas', monospace;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            line-height: 1.5;
        }

        h1 {
            color: var(--cyan);
            font-size: 1.5rem;
            margin: 0 0 5px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .subtitle {
            color: var(--dim);
            font-size: 0.8rem;
            margin-bottom: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-width: 1200px;
        }

        @media (max-width: 800px) {
            .grid { grid-template-columns: 1fr; }
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
        }

        .panel h2 {
            font-size: 0.9rem;
            color: var(--magenta);
            margin: 0 0 15px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--dim);
        }

        .status-dot.active { background: var(--green); box-shadow: 0 0 8px var(--green); }
        .status-dot.warning { background: var(--orange); box-shadow: 0 0 8px var(--orange); }

        label {
            display: block;
            font-size: 0.75rem;
            color: var(--dim);
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        input, textarea, select {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            padding: 8px 10px;
            font-family: inherit;
            font-size: 0.85rem;
            margin-bottom: 10px;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--cyan);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        button {
            background: var(--border);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
        }

        button:hover {
            background: var(--cyan);
            color: var(--bg);
            border-color: var(--cyan);
        }

        button:active {
            transform: scale(0.98);
        }

        button.secondary:hover {
            background: var(--magenta);
            border-color: var(--magenta);
        }

        button.danger:hover {
            background: #ff3333;
            border-color: #ff3333;
        }

        .button-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .output {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 10px;
            font-size: 0.8rem;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .output:empty::before {
            content: 'Output will appear here...';
            color: var(--dim);
        }

        .output .success { color: var(--green); }
        .output .error { color: #ff6666; }
        .output .info { color: var(--cyan); }
        .output .warn { color: var(--orange); }

        .divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 15px 0;
        }

        .collection-item {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 8px 10px;
            margin-bottom: 8px;
            font-size: 0.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .collection-item .id {
            color: var(--dim);
            font-size: 0.7rem;
        }

        .collection-item button {
            padding: 4px 8px;
            font-size: 0.7rem;
        }

        .config-input {
            display: flex;
            gap: 10px;
        }

        .config-input input {
            flex: 1;
            margin-bottom: 0;
        }

        .config-input button {
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <h1>WebSim Stub</h1>
    <p class="subtitle">API Test Console</p>

    <div class="status-bar">
        <div class="status-item">
            <div class="status-dot active"></div>
            <span>Stub Loaded</span>
        </div>
        <div class="status-item">
            <div class="status-dot" id="openai-status"></div>
            <span id="openai-status-text">Chat: Checking...</span>
        </div>
        <div class="status-item">
            <div class="status-dot" id="image-status"></div>
            <span id="image-status-text">Image: Checking...</span>
        </div>
        <div class="status-item">
            <div class="status-dot" id="user-status"></div>
            <span id="user-status-text">User: Loading...</span>
        </div>
    </div>

    <div class="grid">
        <!-- OpenAI Config -->
        <div class="panel">
            <h2>OpenAI Configuration</h2>
            <label>API Key</label>
            <div class="config-input">
                <input type="password" id="api-key" placeholder="sk-...">
                <button onclick="toggleKeyVisibility()">Show</button>
            </div>
            <label>Chat Model</label>
            <select id="chat-model">
                <option value="gpt-4o-mini">gpt-4o-mini (fast, cheap)</option>
                <option value="gpt-4o">gpt-4o (powerful)</option>
                <option value="gpt-4-turbo">gpt-4-turbo</option>
                <option value="gpt-3.5-turbo">gpt-3.5-turbo (legacy)</option>
            </select>
            <label>Image Model</label>
            <select id="image-model">
                <option value="gpt-image-1">gpt-image-1 (GPT-4o, best)</option>
                <option value="dall-e-3">dall-e-3 (high quality)</option>
                <option value="dall-e-2">dall-e-2 (faster, cheaper)</option>
            </select>
            <div class="button-row">
                <button onclick="saveConfig()">Save Config</button>
                <button class="danger" onclick="clearConfig()">Clear</button>
            </div>
        </div>

        <!-- Chat Completions -->
        <div class="panel">
            <h2>Chat Completions</h2>
            <label>System Prompt (optional)</label>
            <input type="text" id="system-prompt" placeholder="You are a helpful assistant...">
            <label>User Message</label>
            <textarea id="chat-input" placeholder="Enter your message...">Suggest a creative name for a drum pattern</textarea>
            <div class="button-row">
                <button onclick="testChat()">Send</button>
                <button class="secondary" onclick="testChatJSON()">Send (expect JSON)</button>
            </div>
            <hr class="divider">
            <label>Response</label>
            <div class="output" id="chat-output"></div>
        </div>

        <!-- Collections -->
        <div class="panel">
            <h2>WebsimSocket Collections</h2>
            <label>Collection Name</label>
            <input type="text" id="collection-name" value="test_items">
            <label>Item Data (JSON)</label>
            <textarea id="item-data">{"name": "Test Item", "value": 42}</textarea>
            <div class="button-row">
                <button onclick="createItem()">Create</button>
                <button class="secondary" onclick="listItems()">List All</button>
                <button class="danger" onclick="clearCollection()">Clear All</button>
            </div>
            <hr class="divider">
            <label>Items</label>
            <div id="collection-items"></div>
        </div>

        <!-- Other APIs -->
        <div class="panel">
            <h2>Other APIs</h2>

            <label>Get Current User</label>
            <div class="button-row" style="margin-bottom: 15px;">
                <button onclick="testGetUser()">Get User</button>
            </div>

            <label>Image Generation (DALL-E when configured)</label>
            <input type="text" id="image-prompt" placeholder="A neon cityscape at night" value="A glowing neon drum machine in a dark studio">
            <label>Aspect Ratio</label>
            <select id="image-aspect">
                <option value="square">Square (1:1)</option>
                <option value="landscape">Landscape (16:9)</option>
                <option value="portrait">Portrait (9:16)</option>
            </select>
            <div class="button-row">
                <button onclick="testImageGen()">Generate</button>
            </div>
            <div id="image-output" style="margin-top: 10px;"></div>

            <hr class="divider">
            <label>Console Log</label>
            <div class="output" id="log-output"></div>
        </div>
    </div>

    <script src="websim.js"></script>
    <script>
        const room = new WebsimSocket();
        let currentCollection = null;

        // Override console.log to capture output
        const originalLog = console.log;
        const logOutput = document.getElementById('log-output');
        console.log = (...args) => {
            originalLog(...args);
            if (args[0]?.startsWith?.('[WebSim') || args[0]?.startsWith?.('[websim')) {
                const line = document.createElement('div');
                line.className = 'info';
                line.textContent = args.map(a => typeof a === 'object' ? JSON.stringify(a) : a).join(' ');
                logOutput.appendChild(line);
                logOutput.scrollTop = logOutput.scrollHeight;
            }
        };

        const originalError = console.error;
        console.error = (...args) => {
            originalError(...args);
            const line = document.createElement('div');
            line.className = 'error';
            line.textContent = args.map(a => typeof a === 'object' ? JSON.stringify(a) : a).join(' ');
            logOutput.appendChild(line);
            logOutput.scrollTop = logOutput.scrollHeight;
        };

        // Initialize status
        async function initStatus() {
            // Check OpenAI config
            const config = websim.getConfig();
            updateOpenAIStatus(config.openai.configured, config.openai.chatModel, config.openai.imageModel);

            // Get user
            const user = await websim.getCurrentUser();
            document.getElementById('user-status').classList.add('active');
            document.getElementById('user-status-text').textContent = `User: @${user.username}`;

            // Load saved config into form
            if (config.openai.configured) {
                document.getElementById('chat-model').value = config.openai.chatModel || 'gpt-4o-mini';
                document.getElementById('image-model').value = config.openai.imageModel || 'dall-e-3';
            }
        }

        function updateOpenAIStatus(configured, chatModel, imageModel) {
            const chatDot = document.getElementById('openai-status');
            const chatText = document.getElementById('openai-status-text');
            const imageDot = document.getElementById('image-status');
            const imageText = document.getElementById('image-status-text');

            if (configured) {
                chatDot.className = 'status-dot active';
                chatText.textContent = `Chat: ${chatModel}`;
                imageDot.className = 'status-dot active';
                imageText.textContent = `Image: ${imageModel}`;
            } else {
                chatDot.className = 'status-dot warning';
                chatText.textContent = 'Chat: mock mode';
                imageDot.className = 'status-dot warning';
                imageText.textContent = 'Image: mock mode';
            }
        }

        function toggleKeyVisibility() {
            const input = document.getElementById('api-key');
            const btn = event.target;
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = 'Hide';
            } else {
                input.type = 'password';
                btn.textContent = 'Show';
            }
        }

        function saveConfig() {
            const apiKey = document.getElementById('api-key').value.trim();
            const chatModel = document.getElementById('chat-model').value;
            const imageModel = document.getElementById('image-model').value;

            if (!apiKey) {
                alert('Please enter an API key');
                return;
            }

            const result = websim.config({ apiKey, chatModel, imageModel });
            updateOpenAIStatus(result.configured, result.chatModel, result.imageModel);
            document.getElementById('api-key').value = '';

            const line = document.createElement('div');
            line.className = 'success';
            line.textContent = `Config saved: chat=${chatModel}, image=${imageModel}`;
            logOutput.appendChild(line);
        }

        function clearConfig() {
            websim.config({ apiKey: null });
            updateOpenAIStatus(false, null, null);

            const line = document.createElement('div');
            line.className = 'warn';
            line.textContent = 'Config cleared - using mock responses';
            logOutput.appendChild(line);
        }

        async function testChat() {
            const output = document.getElementById('chat-output');
            const input = document.getElementById('chat-input').value;
            const systemPrompt = document.getElementById('system-prompt').value;

            output.innerHTML = '<span class="info">Sending...</span>';

            const messages = [];
            if (systemPrompt) {
                messages.push({ role: 'system', content: systemPrompt });
            }
            messages.push({ role: 'user', content: input });

            try {
                const response = await websim.chat.completions.create({ messages });
                output.innerHTML = `<span class="success">${escapeHtml(response.content)}</span>`;
            } catch (e) {
                output.innerHTML = `<span class="error">Error: ${escapeHtml(e.message)}</span>`;
            }
        }

        async function testChatJSON() {
            const output = document.getElementById('chat-output');
            const input = document.getElementById('chat-input').value;
            const systemPrompt = document.getElementById('system-prompt').value || 'Respond with valid JSON only.';

            output.innerHTML = '<span class="info">Sending...</span>';

            const messages = [
                { role: 'system', content: systemPrompt },
                { role: 'user', content: input }
            ];

            try {
                const response = await websim.chat.completions.create({ messages });
                // Try to parse and pretty-print JSON
                try {
                    const json = JSON.parse(response.content);
                    output.innerHTML = `<span class="success">${escapeHtml(JSON.stringify(json, null, 2))}</span>`;
                } catch {
                    output.innerHTML = `<span class="warn">${escapeHtml(response.content)}</span>`;
                }
            } catch (e) {
                output.innerHTML = `<span class="error">Error: ${escapeHtml(e.message)}</span>`;
            }
        }

        async function testGetUser() {
            const user = await websim.getCurrentUser();
            const line = document.createElement('div');
            line.className = 'info';
            line.textContent = `User: ${JSON.stringify(user)}`;
            logOutput.appendChild(line);
        }

        async function testImageGen() {
            const prompt = document.getElementById('image-prompt').value || 'A neon cityscape';
            const aspect_ratio = document.getElementById('image-aspect').value;
            const output = document.getElementById('image-output');

            output.innerHTML = '<span class="info">Generating... (may take 10-20 seconds with DALL-E)</span>';

            try {
                const result = await websim.imageGen({ prompt, aspect_ratio });
                output.innerHTML = `<img src="${result.url}" style="max-width: 100%; max-height: 300px; border-radius: 4px;">`;
            } catch (e) {
                output.innerHTML = `<span class="error">Error: ${e.message}</span>`;
            }
        }

        function getCollection() {
            const name = document.getElementById('collection-name').value || 'test_items';
            return room.collection(name);
        }

        async function createItem() {
            const dataStr = document.getElementById('item-data').value;
            let data;
            try {
                data = JSON.parse(dataStr);
            } catch {
                alert('Invalid JSON');
                return;
            }

            const collection = getCollection();
            await collection.create(data);
            listItems();
        }

        async function listItems() {
            const collection = getCollection();
            const items = await collection.getAll();
            const container = document.getElementById('collection-items');

            if (items.length === 0) {
                container.innerHTML = '<div style="color: var(--dim); font-size: 0.8rem;">No items</div>';
                return;
            }

            container.innerHTML = items.map(item => `
                <div class="collection-item">
                    <div>
                        <div>${escapeHtml(item.name || JSON.stringify(item).substring(0, 50))}</div>
                        <div class="id">${item.id}</div>
                    </div>
                    <button class="danger" onclick="deleteItem('${item.id}')">Delete</button>
                </div>
            `).join('');
        }

        async function deleteItem(id) {
            const collection = getCollection();
            await collection.delete(id);
            listItems();
        }

        async function clearCollection() {
            const collection = getCollection();
            const items = await collection.getAll();
            for (const item of items) {
                await collection.delete(item.id);
            }
            listItems();
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // Initialize
        initStatus();
        listItems();
    </script>
</body>
</html>
